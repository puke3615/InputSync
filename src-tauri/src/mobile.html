<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6366f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="/manifest.json">
<title>InputSync</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #a5b4fc;
    --primary-glow: rgba(99, 102, 241, 0.15);
    --bg: #0f0f1a;
    --bg-card: rgba(30, 30, 60, 0.8);
    --bg-input: rgba(20, 20, 50, 0.9);
    --text: #e8eaf6;
    --text-muted: #9ca3c0;
    --success: #34d399;
    --success-glow: rgba(52, 211, 153, 0.2);
    --danger: #f87171;
    --border: rgba(99, 102, 241, 0.15);
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; height: -webkit-fill-available; }
  body {
    min-height: 100%; min-height: -webkit-fill-available;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%);
    color: var(--text);
    overflow: hidden; position: fixed; inset: 0;
  }

  .app {
    display: flex; flex-direction: column; height: 100%;
    max-width: 500px; margin: 0 auto;
    padding: env(safe-area-inset-top, 0px) 16px env(safe-area-inset-bottom, 0px) 16px;
  }

  .header {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0 8px;
  }
  .header h1 {
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #c4b5fd, var(--primary), #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .icon-btn {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-muted); cursor: pointer; -webkit-appearance: none; transition: all 0.2s;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--primary-glow); }

  .status-bar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 16px; background: var(--bg-card); border-radius: 10px; margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--danger);
    flex-shrink: 0; transition: all 0.4s;
  }
  .status-dot.connected {
    background: var(--success);
    box-shadow: 0 0 8px var(--success-glow), 0 0 16px var(--success-glow);
    animation: glow 2.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 8px var(--success-glow); }
    50% { box-shadow: 0 0 16px var(--success-glow), 0 0 24px var(--success-glow); }
  }
  .status-text { font-size: 13px; color: var(--text-muted); font-weight: 500; }

  .sync-hint {
    flex-shrink: 0; text-align: center; font-size: 11px; color: var(--text-muted);
    opacity: 0.5; margin-bottom: 8px;
  }
  .sync-hint.active { opacity: 1; color: var(--success); }

  .input-card {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg-card); border-radius: var(--radius); padding: 12px;
    border: 1px solid var(--border); min-height: 0; margin-bottom: 10px;
  }
  .input-card .label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted); margin-bottom: 8px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .text-input {
    flex: 1; width: 100%; min-height: 120px;
    padding: 12px 14px; background: var(--bg-input);
    border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 16px; line-height: 1.6; resize: none; outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    -webkit-appearance: none; font-family: inherit;
  }
  .text-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .text-input::placeholder { color: var(--text-muted); opacity: 0.5; }
  .char-count {
    text-align: right; font-size: 11px; color: var(--text-muted); opacity: 0.4;
    margin-top: 4px; font-variant-numeric: tabular-nums;
  }

  .bottom-actions {
    flex-shrink: 0; display: flex; gap: 8px; margin-bottom: 8px;
  }
  .btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; -webkit-appearance: none; touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); }
  .btn-enter {
    background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
  }
  .btn-enter:active { border-color: var(--primary); background: var(--primary-glow); }
  .btn-clear {
    background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); flex: 0.6;
  }
  .btn-clear:active { border-color: var(--danger); background: rgba(248,113,113,0.1); color: var(--danger); }

  .footer-info {
    flex-shrink: 0; text-align: center; padding: 4px;
    font-size: 11px; color: var(--text-muted); opacity: 0.3;
  }

  .add-home-hint {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--primary-glow); border: 1px solid var(--border); border-radius: 10px;
    font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.4;
  }
  .add-home-hint .dismiss {
    margin-left: auto; background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 4px; -webkit-appearance: none;
  }

  .toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    background: rgba(15,15,30,0.92); color: white; padding: 12px 22px;
    border-radius: 12px; font-size: 14px; font-weight: 500;
    pointer-events: none; opacity: 0; transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    z-index: 1000; border: 1px solid var(--border); max-width: 80%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* Settings Panel */
  .panel-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  }
  .panel-overlay.visible { display: block; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .side-panel {
    position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
    background: var(--bg); border-left: 1px solid var(--border); z-index: 101;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px) 16px;
    overflow-y: auto;
  }
  .side-panel.visible { right: 0; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .panel-header h2 { font-size: 18px; font-weight: 700; }
  .panel-close {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-size: 18px; cursor: pointer; -webkit-appearance: none;
  }

  .panel-section { margin-bottom: 20px; }
  .panel-section-title {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1px; font-weight: 700; margin-bottom: 10px;
  }

  .conn-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border);
    margin-bottom: 6px; cursor: pointer; transition: all 0.15s;
  }
  .conn-item:active { background: var(--primary-glow); border-color: var(--primary); }
  .conn-item.current { border-color: var(--success); background: var(--success-glow); }
  .conn-icon {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    background: var(--primary-glow); border-radius: 8px; font-size: 14px; flex-shrink: 0;
  }
  .conn-info { flex: 1; min-width: 0; }
  .conn-host { font-size: 13px; font-weight: 600; font-family: 'SF Mono', monospace; }
  .conn-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .conn-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; flex-shrink: 0;
  }
  .conn-badge.active { background: var(--success-glow); color: var(--success); }
  .conn-badge.saved { background: var(--primary-glow); color: var(--primary-light); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>InputSync</h1>
    <button class="icon-btn" id="settingsBtn" aria-label="设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">正在连接...</span>
  </div>

  <div id="addHomeHint" class="add-home-hint" style="display:none;">
    <span>💡</span>
    <span>添加到主屏幕，下次无需扫码直接打开</span>
    <button class="dismiss" id="dismissHintBtn">✕</button>
  </div>

  <div id="syncHint" class="sync-hint">输入内容将实时同步到电脑</div>

  <div class="input-card">
    <div class="label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      输入内容
    </div>
    <textarea
      class="text-input"
      id="textInput"
      placeholder="在这里输入文字，内容会实时同步到电脑..."
      autocomplete="off"
      autocapitalize="sentences"
      autocorrect="on"
      spellcheck="false"
      inputmode="text"
    ></textarea>
    <div class="char-count" id="charCount">0</div>
  </div>

  <div class="bottom-actions">
    <button class="btn btn-enter" id="enterBtn">↵ 回车</button>
    <button class="btn btn-clear" id="clearBtn">清空</button>
  </div>

  <div class="footer-info" id="footerInfo"></div>
</div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <h2>设置</h2>
    <button class="panel-close" id="panelCloseBtn">✕</button>
  </div>
  <div class="panel-section">
    <div class="panel-section-title">连接记录</div>
    <div id="connectionList"></div>
  </div>
  <div class="panel-section">
    <div class="panel-section-title">关于</div>
    <div style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
      InputSync v1.0<br>
      局域网语音输入同步工具<br>
      完全本地通信，无需云服务
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  var KEY_CONNECTIONS = 'is_connections';
  var KEY_HOME_HINT = 'is_home_hint_dismissed';

  var ws = null;
  var connected = false;
  var reconnectTimer = null;
  var reconnectAttempts = 0;
  var syncTimer = null;
  var lastSyncedText = '';
  var composing = false;

  var textInput = document.getElementById('textInput');
  var statusDot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  var charCount = document.getElementById('charCount');
  var syncHint = document.getElementById('syncHint');

  init();

  function init() {
    bindEvents();
    connectWS();
    saveConnection();
    showHomeHint();
  }

  function bindEvents() {
    // Input: real-time sync
    textInput.addEventListener('input', function() {
      charCount.textContent = textInput.value.length;
      if (!composing) scheduleSync();
    });

    textInput.addEventListener('compositionstart', function() {
      composing = true;
    });

    textInput.addEventListener('compositionend', function() {
      composing = false;
      charCount.textContent = textInput.value.length;
      scheduleSync();
    });

    // iOS: scroll into view on focus
    textInput.addEventListener('focus', function() {
      requestAnimationFrame(function() {
        setTimeout(function() {
          textInput.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 350);
      });
    });

    // Buttons
    document.getElementById('enterBtn').addEventListener('click', function() {
      if (!connected) return;
      ws.send(JSON.stringify({ type: 'enter' }));
      showSyncHint('已发送回车');
    });

    document.getElementById('clearBtn').addEventListener('click', function() {
      textInput.value = '';
      charCount.textContent = '0';
      lastSyncedText = '';
      if (connected) {
        ws.send(JSON.stringify({ type: 'sync', text: '' }));
        showSyncHint('已清空');
      }
    });

    document.getElementById('settingsBtn').addEventListener('click', openPanel);
    document.getElementById('panelOverlay').addEventListener('click', closePanel);
    document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
    document.getElementById('dismissHintBtn').addEventListener('click', dismissHomeHint);

    // Viewport resize (virtual keyboard)
    if (window.visualViewport) {
      var lastH = window.visualViewport.height;
      window.visualViewport.addEventListener('resize', function() {
        var vh = window.visualViewport.height;
        var diff = lastH - vh;
        if (diff > 100) {
          document.body.style.height = vh + 'px';
        } else if (diff < -100) {
          document.body.style.height = '100%';
        }
        lastH = vh;
      });
      window.visualViewport.addEventListener('scroll', function() {
        window.scrollTo(0, 0);
      });
    }

    // Prevent iOS pull-to-refresh
    document.body.addEventListener('touchmove', function(e) {
      var scrollable = e.target.closest('.text-input, .side-panel');
      if (!scrollable) e.preventDefault();
    }, { passive: false });

    // Reconnect on visibility change
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible' && (!ws || ws.readyState > 1)) {
        reconnectAttempts = 0;
        connectWS();
      }
    });
  }

  // ─── Real-time Sync ───

  function scheduleSync() {
    clearTimeout(syncTimer);
    syncTimer = setTimeout(doSync, 250);
  }

  function doSync() {
    var text = textInput.value;
    if (text === lastSyncedText) return;
    if (!connected || !ws || ws.readyState !== 1) return;

    lastSyncedText = text;
    ws.send(JSON.stringify({ type: 'sync', text: text }));
    showSyncHint('已同步 (' + text.length + ' 字)');
  }

  function showSyncHint(msg) {
    syncHint.textContent = msg;
    syncHint.classList.add('active');
    clearTimeout(syncHint._t);
    syncHint._t = setTimeout(function() {
      syncHint.classList.remove('active');
      syncHint.textContent = '输入内容将实时同步到电脑';
    }, 1500);
  }

  // ─── WebSocket ───

  function getWsUrl() {
    var p = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return p + '//' + location.host + '/ws';
  }

  function connectWS() {
    if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
    statusText.textContent = '正在连接...';
    try {
      ws = new WebSocket(getWsUrl());
    } catch (e) {
      statusText.textContent = '连接失败';
      scheduleReconnect();
      return;
    }

    ws.onopen = function() {
      connected = true;
      reconnectAttempts = 0;
      statusDot.classList.add('connected');
      statusText.textContent = '已连接';
      toast('已连接到电脑');
      updateConnectionStatus(true);
    };

    ws.onmessage = function(ev) {
      try { JSON.parse(ev.data); } catch(e) {}
    };

    ws.onclose = function() {
      connected = false;
      statusDot.classList.remove('connected');
      statusText.textContent = '连接断开';
      updateConnectionStatus(false);
      scheduleReconnect();
    };

    ws.onerror = function() {
      connected = false;
      statusDot.classList.remove('connected');
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    if (reconnectAttempts >= 200) {
      statusText.textContent = '无法连接，请检查网络';
      return;
    }
    var delay = Math.min(1000 * Math.pow(1.3, reconnectAttempts), 8000);
    reconnectAttempts++;
    reconnectTimer = setTimeout(function() {
      statusText.textContent = '重连中 (' + reconnectAttempts + ')...';
      connectWS();
    }, delay);
  }

  // ─── Settings Panel ───

  function openPanel() {
    document.getElementById('panelOverlay').classList.add('visible');
    document.getElementById('sidePanel').classList.add('visible');
    renderConnections();
  }

  function closePanel() {
    document.getElementById('panelOverlay').classList.remove('visible');
    document.getElementById('sidePanel').classList.remove('visible');
  }

  // ─── Connection Records ───

  function saveConnection() {
    try {
      var conns = load(KEY_CONNECTIONS) || [];
      var cur = {
        url: location.origin, host: location.host,
        ip: location.hostname, port: location.port || '5678',
        lastSeen: Date.now(), network: getNetworkId(), connected: true
      };
      var idx = conns.findIndex(function(c) { return c.host === cur.host; });
      if (idx >= 0) { Object.assign(conns[idx], cur); } else { conns.unshift(cur); }
      if (conns.length > 20) conns.length = 20;
      save(KEY_CONNECTIONS, conns);
      document.getElementById('footerInfo').textContent = cur.host + ' · ' + getNetworkLabel(cur.network);
    } catch (e) {}
  }

  function updateConnectionStatus(isConnected) {
    try {
      var conns = load(KEY_CONNECTIONS) || [];
      var idx = conns.findIndex(function(c) { return c.host === location.host; });
      if (idx >= 0) {
        conns[idx].connected = isConnected;
        conns[idx].lastSeen = Date.now();
        save(KEY_CONNECTIONS, conns);
      }
    } catch (e) {}
  }

  function renderConnections() {
    var conns = load(KEY_CONNECTIONS) || [];
    var list = document.getElementById('connectionList');
    if (!conns.length) {
      list.innerHTML = '<div style="font-size:13px;color:var(--text-muted);">暂无连接记录</div>';
      return;
    }
    var groups = {};
    conns.forEach(function(c) {
      var net = c.network || 'unknown';
      if (!groups[net]) groups[net] = [];
      groups[net].push(c);
    });
    var html = '';
    Object.keys(groups).forEach(function(net) {
      html += '<div style="font-size:11px;color:var(--text-muted);margin:8px 0 4px;font-weight:600;">' +
              getNetworkLabel(net) + '</div>';
      groups[net].forEach(function(c) {
        var isCurrent = c.host === location.host;
        html += '<div class="conn-item' + (isCurrent ? ' current' : '') + '" data-url="' + esc(c.url) + '">' +
          '<div class="conn-icon">' + (isCurrent ? '🟢' : '📡') + '</div>' +
          '<div class="conn-info">' +
            '<div class="conn-host">' + esc(c.host) + '</div>' +
            '<div class="conn-meta">' + timeAgo(c.lastSeen) + '</div>' +
          '</div>' +
          '<span class="conn-badge ' + (isCurrent ? 'active' : 'saved') + '">' +
            (isCurrent ? '当前' : '历史') +
          '</span></div>';
      });
    });
    list.innerHTML = html;
    list.querySelectorAll('.conn-item').forEach(function(el) {
      el.addEventListener('click', function() {
        var url = el.getAttribute('data-url');
        if (url && url !== location.origin) {
          window.location.href = url;
        } else {
          closePanel();
        }
      });
    });
  }

  function getNetworkId() {
    var parts = location.hostname.split('.');
    if (parts.length === 4) return parts.slice(0, 3).join('.');
    return location.hostname;
  }

  function getNetworkLabel(netId) {
    if (!netId || netId === 'unknown') return '未知网络';
    return '网段 ' + netId + '.x';
  }

  // ─── Home Screen Hint ───

  function showHomeHint() {
    if (load(KEY_HOME_HINT)) return;
    var isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (isMobile && !isStandalone) {
      document.getElementById('addHomeHint').style.display = 'flex';
    }
  }

  function dismissHomeHint() {
    document.getElementById('addHomeHint').style.display = 'none';
    save(KEY_HOME_HINT, true);
  }

  // ─── Utils ───

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.classList.remove('show'); }, 1400);
  }

  function timeAgo(ts) {
    var d = Date.now() - ts;
    if (d < 60000) return '刚刚';
    if (d < 3600000) return Math.floor(d / 60000) + '分前';
    if (d < 86400000) return Math.floor(d / 3600000) + '小时前';
    return Math.floor(d / 86400000) + '天前';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }

  function load(key) {
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
  }

  // Keepalive
  setInterval(function() {
    if (ws && ws.readyState === 1) {
      try { ws.send('{"type":"ping"}'); } catch(e) {}
    }
  }, 20000);
})();
</script>
