name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main

jobs:
  check-version:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          echo "current=$CURRENT previous=$PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: |
      always() &&
      (needs.check-version.result == 'skipped' || needs.check-version.outputs.changed == 'true')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'TalkType v__VERSION__'
          releaseBody: |
            ## TalkType v__VERSION__

            > 🎙️ Speak on your phone → ⌨️ text appears on your computer → in any app.
            > Global voice input for vibe coding.

            ### What's New
            * Removed the entire scene automation system for a simpler, focused experience
            * Switched from real-time sync to explicit "tap to send" model
            * Added auto-enter toggle: optionally press Enter after sending, great for chat apps
            * Simplified WebSocket protocol to a single `send` message type
            * Removed `uuid`, `arboard`, `rfd` dependencies — smaller binary size
            * Redesigned mobile UI: inline status indicator, cleaner layout, auto-enter switch
            * Desktop UI: removed scene editor, streamlined settings

            ### 更新内容
            * 移除场景自动化系统，回归简洁核心体验
            * 从「实时同步」改为「点击发送」模式
            * 新增自动回车开关：发送后可自动按回车，适用于聊天场景
            * WebSocket 协议精简为单一 `send` 消息类型
            * 移除 `uuid`、`arboard`、`rfd` 依赖，减小包体积
            * 手机端 UI 重新设计：状态指示内联、布局更简洁、自动回车开关
            * 桌面端移除场景编辑器，精简设置页面

            ### Download
            | Platform | File |
            |---|---|
            | **macOS (Apple Silicon)** | `_aarch64.dmg` |
            | **macOS (Intel)** | `_x64.dmg` |
            | **Windows** | `.msi` or `.exe` |
            | **Linux** | `.deb` or `.AppImage` |
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
