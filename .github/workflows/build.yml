name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main

jobs:
  check-version:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          echo "current=$CURRENT previous=$PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: |
      always() &&
      (needs.check-version.result == 'skipped' || needs.check-version.outputs.changed == 'true')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'TalkType v__VERSION__'
          releaseBody: |
            ## TalkType v__VERSION__

            > 🎙️ Speak on your phone → ⌨️ text appears on your computer → in any app.
            > Global voice input for vibe coding.

            ### What's New
            * Auto-refresh local IP, URL, and QR when the network changes (5s poll + `network-info-changed` event)
            * Tray menu: **Refresh Network**; new `refresh_network_info` command
            * `/api/info` and `get_server_info` now include `ips`; cached IP list kept in sync with OS
            * Desktop URL bar: icon buttons for refresh (with spinner + minimum loading time) and copy (checkmark feedback, fixed 30×30 layout)
            * Settings: **Check for Updates** shows current version (e.g. `v1.9.0`)

            ### 更新内容
            * 网络环境变化时自动刷新本机 IP、地址与二维码（约 5 秒轮询 + `network-info-changed` 事件）
            * 托盘新增 **Refresh Network**；新增 `refresh_network_info` 命令
            * `/api/info` 与 `get_server_info` 返回 `ips` 列表；与系统网卡列表保持同步
            * 桌面地址栏：刷新与复制改为图标按钮（刷新带转圈 loading 与最短展示时长；复制以对号反馈、固定 30×30 避免抖动）
            * 设置中「检查更新」展示当前版本号（如 `v1.9.0`）

            ### Download
            | Platform | File |
            |---|---|
            | **macOS (Apple Silicon)** | `_aarch64.dmg` |
            | **macOS (Intel)** | `_x64.dmg` |
            | **Windows** | `.msi` or `.exe` |
            | **Linux** | `.deb` or `.AppImage` |
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
