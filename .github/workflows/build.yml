name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'TalkType v__VERSION__'
          releaseBody: |
            ## TalkType v__VERSION__

            > 🎙️ Speak on your phone → ⌨️ text appears on your computer → in any app.
            > Global voice input for vibe coding.

            ### What's New
            * README 全面重写，英文优先，SEO 优化，对标竞品对比
            * 桌面端 & 手机端文案优化，突出「语音输入」定位
            * Manifest 增加 description 字段，提升 PWA 识别度

            ### Download
            | Platform | File |
            |---|---|
            | **macOS (Apple Silicon)** | `_aarch64.dmg` |
            | **macOS (Intel)** | `_x64.dmg` |
            | **Windows** | `.msi` or `.exe` |
            | **Linux** | `.deb` or `.AppImage` |
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
