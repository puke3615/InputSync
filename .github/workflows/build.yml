name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main

jobs:
  check-version:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          echo "current=$CURRENT previous=$PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: |
      always() &&
      (needs.check-version.result == 'skipped' || needs.check-version.outputs.changed == 'true')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'TalkType v__VERSION__'
          releaseBody: |
            ## TalkType v__VERSION__

            > 🎙️ Speak on your phone → ⌨️ text appears on your computer → in any app.
            > Global voice input for vibe coding.

            ### What's New
            * Mobile web: **message history** (optional local save + max count), **detail** overlay (tap a row), delete from list; **Toasts** top-right with slide-in and **success / warning / error** styling
            * Mobile: input **clears right after send** over WebSocket; **removed** clipboard-based copy (avoids extra permissions on LAN HTTP)
            * WebSocket **`send`** is fire-and-forget: desktop simulates typing in a **background** `spawn_blocking` task; failures are **logged on the server** (no `send_ack` round-trip)
            * `keyboard::type_text` returns **`Result`** for structured errors in desktop logs

            ### 更新内容
            * 手机网页：**消息历史**（可选是否写入本机、可设最多条数）、**全文详情**（点击整行进入）、列表内删除；**Toast** 改为右上角滑入，并区分 **成功 / 警告 / 错误** 配色
            * 手机端：WebSocket **发出后即清空输入**；**移除**依赖剪贴板的复制（避免局域网 HTTP 下额外权限问题）
            * WebSocket **`send`** 为单向投递：电脑端在后台 **`spawn_blocking`** 中模拟输入，错误仅在**服务端日志**记录（**无 `send_ack` 回包**）
            * `keyboard::type_text` 返回 **`Result`**，便于桌面端记录结构化错误

            ### Download
            | Platform | File |
            |---|---|
            | **macOS (Apple Silicon)** | `_aarch64.dmg` |
            | **macOS (Intel)** | `_x64.dmg` |
            | **Windows** | `.msi` or `.exe` |
            | **Linux** | `.deb` or `.AppImage` |
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
