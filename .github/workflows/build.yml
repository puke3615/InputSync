name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main

jobs:
  check-version:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          echo "current=$CURRENT previous=$PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: |
      always() &&
      (needs.check-version.result == 'skipped' || needs.check-version.outputs.changed == 'true')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'TalkType v__VERSION__'
          releaseBody: |
            ## TalkType v__VERSION__

            > 🎙️ Speak on your phone → ⌨️ text appears on your computer → in any app.
            > Global voice input for vibe coding.

            ### What's New
            * Renamed project (InputSync → TalkType), full i18n support (CN→EN UI)
            * Refreshed app icons across all platforms
            * Added "Open Config Directory" feature
            * Major README rewrite; added Chinese README (README_CN.md)
            * CI build workflow optimizations (path-based trigger filters)
            * Desktop & mobile UX improvements

            ### 更新内容
            * 项目重命名（InputSync → TalkType），全面国际化支持（中文 → 英文 UI）
            * 全平台应用图标优化
            * 新增「打开配置目录」功能
            * README 全面重写，新增中文版 README_CN.md
            * CI 构建流程优化（基于路径的触发过滤）
            * 桌面端 & 手机端体验优化

            ### Download
            | Platform | File |
            |---|---|
            | **macOS (Apple Silicon)** | `_aarch64.dmg` |
            | **macOS (Intel)** | `_x64.dmg` |
            | **Windows** | `.msi` or `.exe` |
            | **Linux** | `.deb` or `.AppImage` |
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
