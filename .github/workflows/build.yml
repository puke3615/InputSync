name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'InputSync v__VERSION__'
          releaseBody: |
            InputSync v__VERSION__

            ### 更新日志
            * 将「忽略标点前缀」从同步文字动作迁移至文本转换，提升动作组合灵活性
            * 导出场景改为系统文件选择对话框，用户可自由选择保存位置
            * 精简内置场景为 2 个，并以 JSON 文件形式维护，便于后续扩展

            ### 下载说明
            - **macOS (Apple Silicon)**: 下载 `_aarch64.dmg` 文件
            - **macOS (Intel)**: 下载 `_x64.dmg` 文件
            - **Windows**: 下载 `.msi` 或 `.exe` 文件
            - **Linux**: 下载 `.deb` 或 `.AppImage` 文件
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
